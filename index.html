<!DOCTYPE html>
<html>
<head>
  <title>CA Practice Manager</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    h2 { margin-top:30px; }
    table { width:100%; border-collapse: collapse; background:#fff; }
    th, td { padding:10px; border:1px solid #ddd; font-size:14px; }
    th { background:#eee; }
    button { padding:6px 10px; cursor:pointer; }
    .done { color:green; font-weight:bold; }
    .pending { color:orange; }
  </style>
</head>

<body>

<h2>📅 Due Dates (Control Panel)</h2>

<table>
  <thead>
    <tr>
      <th>Client</th>
      <th>Compliance</th>
      <th>Due Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="dueBody"></tbody>
</table>

<h2>📋 Tasks (Execution)</h2>

<table>
  <thead>
    <tr>
      <th>Task</th>
      <th>Client</th>
      <th>Due</th>
      <th>Status</th>
      <th>Remarks</th>
    </tr>
  </thead>
  <tbody id="taskBody"></tbody>
</table>

<!-- LINK JS FILE -->
<script src="app.js"></script>

</body>
</html>
